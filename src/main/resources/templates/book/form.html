<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Cập nhật Sách' : 'Thêm Sách Mới'">Form Sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h3 class="card-title h4 mb-0" th:text="${isEdit} ? 'Cập nhật Sách' : 'Thêm Sách Mới'">Form Sách</h3>
                    <a href="/books" class="btn btn-link text-decoration-none px-0">Quay lại danh sách sách</a>
                </div>
                <div class="card-body">
                    <form th:action="${isEdit} ? '/books/update/' + ${book.id} : '/books/create'" th:object="${book}" method="post">

                        <input type="hidden" name="page" th:value="${currentPage}">
                        <input type="hidden" name="keyword" th:value="${keyword}">
                        <input type="hidden" name="sortField" th:value="${sortField}">
                        <input type="hidden" name="sortDir" th:value="${sortDir}">

                        <div class="mb-3">
                            <label for="title" class="form-label fw-bold">Tiêu đề sách <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" th:field="*{title}" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''" placeholder="Nhập tiêu đề sách (5-150 ký tự)">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="author" class="form-label fw-bold">Tác giả <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="author" name="author" th:field="*{author}" th:classappend="${#fields.hasErrors('author')} ? 'is-invalid' : ''" placeholder="Nhập tên tác giả (2-100 ký tự)">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="isbn" class="form-label fw-bold">ISBN <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="isbn" name="isbn" th:field="*{isbn}" th:classappend="${#fields.hasErrors('isbn')} ? 'is-invalid' : ''" placeholder="13 chữ số (ví dụ: 9781234567890)">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="publicationYear" class="form-label fw-bold">Năm xuất bản <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="publicationYear" name="publicationYear" th:field="*{publicationYear}" th:classappend="${#fields.hasErrors('publicationYear')} ? 'is-invalid' : ''" placeholder="1900 - 2026">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('publicationYear')}" th:errors="*{publicationYear}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="price" class="form-label fw-bold">Giá bán (VND) <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="price" name="price" th:field="*{price}" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''" placeholder="1000 - 1000000">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1" th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'">Lưu sách</button>
                            <button type="button" class="btn btn-secondary flex-grow-1" onclick="window.location.href='/books'">Hủy bỏ</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
